<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Flutter</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      background: #2C2A4A;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      color: #ECE5F0;
      user-select: none;
      -webkit-app-region: drag;
      overflow: hidden;
    }
    .wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
    }
    .spinner {
      width: 52px;
      height: 52px;
      border: 4px solid rgba(144, 122, 214, 0.2);
      border-top-color: #907AD6;
      border-radius: 50%;
      animation: spin 0.85s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .app-name {
      font-size: 20px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: #ECE5F0;
    }
    .status {
      font-size: 13px;
      color: #b8aec5;
      letter-spacing: 0.05em;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="spinner"></div>
    <div class="app-name">Flutter</div>
    <div class="status">Starting services...</div>
  </div>
</body>
</html>
