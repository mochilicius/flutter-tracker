<div class="shell">
  <header class="titlebar">
    <div class="brand">
      <svg viewBox="0 0 24 24" aria-hidden="true" class="feather-icon">
        <path d="M20 4c-4 0-8 2-10.5 5.4c-2.1 2.7-3.2 5.9-3.2 9.3v1.3h1.3c3.4 0 6.6-1.1 9.3-3.2C20 14.3 22 10 22 6V4z"></path>
        <path d="M6.3 19.9l8.2-8.2"></path>
      </svg>
      <span>Flutter</span>
    </div>

    <div class="window-controls">
      <button type="button" class="control-btn" aria-label="Minimize" (click)="minimizeWindow()">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M6 12h12"></path></svg>
      </button>
      <button type="button" class="control-btn close" aria-label="Close" (click)="closeWindow()">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 7l10 10M17 7L7 17"></path></svg>
      </button>
    </div>
  </header>

  <div class="body">
    <nav class="sidebar">
      <button class="nav-btn" [class.active]="activeTab() === 'home'" (click)="activeTab.set('home')" aria-label="Home">
        <i class="pi pi-home"></i>
      </button>
      <button class="nav-btn" [class.active]="activeTab() === 'stats'" (click)="activeTab.set('stats')" aria-label="Stats">
        <i class="pi pi-chart-bar"></i>
      </button>
      <button class="nav-btn" [class.active]="activeTab() === 'settings'" (click)="activeTab.set('settings')" aria-label="Settings">
        <i class="pi pi-cog"></i>
      </button>
    </nav>

    <main class="content">
      @switch (activeTab()) {
        @case ('home') {
          <app-main [pollIntervalMs]="pingMs()" />
        }
        @case ('stats') {
          <app-stats />
        }
        @case ('settings') {
          <app-settings
            [pingValue]="pingMs()"
            [startOnBoot]="startOnBoot()"
            [minimizeToTrayOnClose]="minimizeToTrayOnClose()"
            [retentionDays]="retentionDays()"
            (pingValueChange)="updatePingMs($event)"
            (startOnBootChange)="updateStartOnBoot($event)"
            (minimizeToTrayOnCloseChange)="updateMinimizeToTrayOnClose($event)"
            (retentionDaysChange)="updateRetentionDays($event)"
          />
        }
      }
    </main>
  </div>
</div>
